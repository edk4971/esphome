# =============================================================================
# openai_realtime component block.
#
# This file is meant to be !included from common.yaml. It contains ONLY the
# component configuration and its automations — all hardware/platform config
# lives in common.yaml.
# =============================================================================

# --- External component ------------------------------------------------------
external_components:
  - source:
      type: local
      path: /config
    components: [openai_realtime]

# --- openai_realtime --------------------------------------------------------
openai_realtime:
  id: openai
  api_key: ${openai_api_key}
  model: ${openai_chat_model}
  endpoint: ${openai_endpoint_base}
  system_prompt: ${openai_prompt}
  voice: ${openai_tts_voice}
  language: "en"
  microphone: box_mic
  speaker: box_speaker
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.5
  # MCP tool servers — declared in session.update with type:"mcp" so the server
  # connects to them, imports tools, and executes them server-side.
  tools:
    - type: mcp
      server_label: homeassistant
      server_url: ${ha_url}
      auth_token: ${ha_token}
      require_approval: never
    - type: mcp
      server_label: openzim
      server_url: ${openzim_url}
      auth_token: ${openzim_token}
      require_approval: never
  text_request: request_text
  text_response: response_text
  # --- Automations ---
  on_listening:
    - lambda: |-
        id(status_text).publish_state("Listening...");
        id(request_text).publish_state("");
        id(response_text).publish_state("");
    - lambda: |-
        id(display_spi).show_page(listening_page);
        id(display_spi).update();
  on_start:
    - lambda: id(status_text).publish_state("Connected");
  on_stt_vad_start:
    - lambda: id(status_text).publish_state("Speech started");
  on_stt_vad_end:
    - lambda: id(status_text).publish_state("Speech ended");
  on_stt_end:
    - lambda: id(request_text).publish_state(x);
    - lambda: |-
        id(display_spi).show_page(thinking_page);
        id(display_spi).update();
  on_tool_start:
    - lambda: id(status_text).publish_state("Searching...");
    - lambda: |-
        id(display_spi).show_page(searching_page);
        id(display_spi).update();
  on_tts_start:
    - lambda: id(response_text).publish_state(x);
  on_tts_stream_start:
    - lambda: id(status_text).publish_state("Speaking...");
    - lambda: |-
        id(display_spi).show_page(replying_page);
        id(display_spi).update();
  on_tts_stream_end:
    - lambda: id(status_text).publish_state("Finished");
  on_tts_end:
    - lambda: id(response_text).publish_state(x);
  on_end:
    - lambda: id(status_text).publish_state("Done");
  on_error:
    - lambda: |-
        id(status_text).publish_state("Error: " + code);
    - lambda: |-
        id(display_spi).show_page(error_page);
        id(display_spi).update();
  on_idle:
    - if:
        condition:
          switch.is_on: mute
        then:
          - lambda: id(status_text).publish_state("Muted");
          - lambda: |-
              id(display_spi).show_page(muted_page);
              id(display_spi).update();
        else:
          - lambda: id(status_text).publish_state("Idle");
          - lambda: |-
              id(display_spi).show_page(idle_page);
              id(display_spi).update();
  on_client_connected:
    - lambda: id(status_text).publish_state("OpenAI connected");
  on_client_disconnected:
    - lambda: id(status_text).publish_state("OpenAI disconnected");
